openapi: 3.0.3
info:
  title: Auto Mode API Contracts
  version: 1.0.0
  description: Contracts for queue discovery, lifecycle control, status tracking, and in-cycle branch integration for Auto Mode.

paths:
  /api/automode/state:
    get:
      summary: Read current Auto Mode runtime state
      operationId: getAutoModeState
      responses:
        '200':
          description: Current persisted/runtime state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoModeStateResponse'

  /api/automode/start:
    post:
      summary: Start a single Auto Mode cycle
      operationId: startAutoMode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartAutoModeRequest'
      responses:
        '200':
          description: Auto Mode started and queue initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoModeStartResponse'
        '400':
          description: Invalid branch/concurrency/request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/automode/stop:
    post:
      summary: Disable Auto Mode for current cycle
      operationId: stopAutoMode
      responses:
        '200':
          description: Stop accepted; queued tasks failed, running tasks continue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoModeStopResponse'

  /api/automode/status:
    get:
      summary: Fetch queue/task progress for UI polling or refresh resume
      operationId: getAutoModeStatus
      responses:
        '200':
          description: Task-level status snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoModeStatusResponse'

  /api/automode/integration/prepare:
    post:
      summary: Prepare shared integration branch sc/automode from selected base branch
      operationId: prepareAutoModeIntegrationBranch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [baseBranch]
              properties:
                baseBranch:
                  type: string
      responses:
        '200':
          description: Integration branch prepared
          content:
            application/json:
              schema:
                type: object
                required: [success, branch, baseBranch]
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  branch:
                    type: string
                    enum: [sc/automode]
                  baseBranch:
                    type: string
        '409':
          description: Branch preparation conflict or invalid branch state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/automode/integration/feature:
    post:
      summary: Integrate completed feature conversation result into sc/automode
      operationId: integrateAutoModeFeature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntegrateFeatureRequest'
      responses:
        '200':
          description: Integration succeeded or was auto-resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrateFeatureResponse'
        '409':
          description: Integration conflict unresolved after automatic attempt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    AutoModeTask:
      type: object
      required: [featureId, kind, state, steps]
      properties:
        featureId:
          type: string
        kind:
          type: string
          enum: [feature, constitution]
        state:
          type: string
          enum: [queued, running, success, failed, skipped]
        conversationId:
          type: string
          nullable: true
        startStep:
          type: string
          enum: [plan, tasks, skill:better-spec]
        steps:
          type: array
          items:
            type: string
        reason:
          type: string
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true

    AutoModeHashRecord:
      type: object
      required: [featureId, specHash, planHash, tasksHash, updatedAt]
      properties:
        featureId:
          type: string
        specHash:
          type: string
          pattern: '^[a-f0-9]{64}$'
        planHash:
          type: string
          pattern: '^[a-f0-9]{64}$'
        tasksHash:
          type: string
          pattern: '^[a-f0-9]{64}$'
        updatedAt:
          type: string
          format: date-time

    AutoModeStateResponse:
      type: object
      required: [enabled, status, concurrency, integrationBranch, queue, activeFeatureIds, processedFeatureIds]
      properties:
        enabled:
          type: boolean
        cycleId:
          type: string
          nullable: true
        status:
          type: string
          enum: [idle, running, stopping]
        baseBranch:
          type: string
          nullable: true
        integrationBranch:
          type: string
          enum: [sc/automode]
        concurrency:
          type: integer
          minimum: 1
        queue:
          type: array
          items:
            $ref: '#/components/schemas/AutoModeTask'
        activeFeatureIds:
          type: array
          items:
            type: string
        processedFeatureIds:
          type: array
          items:
            type: string
        hashes:
          type: array
          items:
            $ref: '#/components/schemas/AutoModeHashRecord'

    StartAutoModeRequest:
      type: object
      required: [baseBranch]
      properties:
        baseBranch:
          type: string
        concurrency:
          type: integer
          minimum: 1
          default: 3

    AutoModeStartResponse:
      type: object
      required: [success, state]
      properties:
        success:
          type: boolean
        state:
          $ref: '#/components/schemas/AutoModeStateResponse'

    AutoModeStopResponse:
      type: object
      required: [success, stoppedAt, failedQueuedCount, runningCount]
      properties:
        success:
          type: boolean
        stoppedAt:
          type: string
          format: date-time
        failedQueuedCount:
          type: integer
        runningCount:
          type: integer

    AutoModeStatusResponse:
      type: object
      required: [state]
      properties:
        state:
          $ref: '#/components/schemas/AutoModeStateResponse'

    IntegrateFeatureRequest:
      type: object
      required: [featureId, conversationId, sourceBranch, targetBranch]
      properties:
        featureId:
          type: string
        conversationId:
          type: string
        sourceBranch:
          type: string
        targetBranch:
          type: string
          enum: [sc/automode]

    IntegrateFeatureResponse:
      type: object
      required: [success, featureId, targetBranch, resolvedByAI]
      properties:
        success:
          type: boolean
        featureId:
          type: string
        targetBranch:
          type: string
          enum: [sc/automode]
        resolvedByAI:
          type: boolean
        commit:
          type: string
          nullable: true

    ErrorResponse:
      type: object
      required: [statusCode, statusMessage]
      properties:
        statusCode:
          type: integer
        statusMessage:
          type: string
